<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connections</title>

<style>

body{
margin:0;
font-family:Arial;
background:#121213;
color:white;
text-align:center;
}

h1{
margin:10px;
font-size:22px;
}

#groups{
max-width:420px;
margin:auto;
}

.groupRow{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:6px 10px;
}

#grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px;
max-width:420px;
margin:auto;
}

.tile{

height:60px;
display:flex;
align-items:center;
justify-content:center;

background:#3a3a3c;
border-radius:8px;

font-weight:bold;
font-size:15px;

}

.tile.selected{
background:#b59f3b;
}

.groupRow .tile{
background:#538d4e;
}

#submitBtn{

margin-top:10px;

padding:12px 20px;
font-size:16px;

border:none;
border-radius:8px;

background:#565758;
color:white;

}

#info{
margin-top:10px;
font-size:15px;
}

#overlay{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

background:rgba(0,0,0,0.9);

display:none;

align-items:center;
justify-content:center;

}

#panel{

background:#1a1a1b;
padding:25px;
border-radius:12px;

width:80%;
max-width:300px;

}

#panel button{

margin-top:10px;
width:100%;
padding:10px;

border:none;
border-radius:6px;

background:#538d4e;
color:white;

}

</style>

</head>
<body>

<h1>Connections</h1>

<div id="groups"></div>

<div id="grid"></div>

<button id="submitBtn">Gruppe prüfen</button>

<div id="info"></div>

<div id="overlay">
<div id="panel">

<h2 id="resultTitle"></h2>

<div id="stats"></div>

<button id="restartBtn">Neue Runde</button>

</div>
</div>

<script>

const categories=[

{name:"Früchte",words:[
"APFEL","BIRNE","MANGO","TRAUBE","BANANE","PFIRSICH","KIRSCHE","MELONE"
]},

{name:"Farben",words:[
"ROT","BLAU","GRUEN","GELB","ORANGE","LILA","BRAUN","WEISS"
]},

{name:"Tiere",words:[
"TIGER","ZEBRA","PANDA","OTTER","WOLF","BISON","ADLER","FUCHS"
]},

{name:"Möbel",words:[
"TISCH","STUHL","SOFA","BETT","SCHRANK","LAMPE","REGAL","HOCKER"
]},

{name:"Fahrzeuge",words:[
"AUTO","BUS","ZUG","RAD","BOOT","TRAM","TAXI","ROLLER"
]},

{name:"Wetter",words:[
"SONNE","REGEN","WIND","NEBEL","HAGEL","STURM","HITZE","FROST"
]}

]

let gameCats=[]
let words=[]
let selected=[]

let mistakes=0
let solved=0

let statsPlayed=0
let statsWins=0

startGame()

function startGame(){

gameCats=[...categories].sort(()=>Math.random()-0.5).slice(0,4)

words=[]

gameCats.forEach(c=>{

let selectedWords=[...c.words]
.sort(()=>Math.random()-0.5)
.slice(0,4)

c.roundWords=selectedWords

words.push(...selectedWords)

})

words=words.sort(()=>Math.random()-0.5)

drawGrid()

updateInfo()

}

function drawGrid(){

const grid=document.getElementById("grid")
grid.innerHTML=""

words.forEach(word=>{

let tile=document.createElement("div")

tile.className="tile"
tile.innerText=word

tile.onclick=()=>selectTile(tile,word)

grid.appendChild(tile)

})

}

function selectTile(tile,word){

if(tile.classList.contains("selected")){

tile.classList.remove("selected")
selected=selected.filter(w=>w!==word)

return

}

if(selected.length<4){

tile.classList.add("selected")
selected.push(word)

}

}

document.getElementById("submitBtn").onclick=checkGroup

function checkGroup(){

if(selected.length!==4) return

for(let cat of gameCats){

if(selected.every(w=>cat.roundWords.includes(w))){

createGroup(cat)

words=words.filter(w=>!cat.words.includes(w))

selected=[]

solved++

drawGrid()

updateInfo()

checkWin()

return

}

}

mistakes++

selected=[]

document.querySelectorAll(".selected")
.forEach(t=>t.classList.remove("selected"))

updateInfo()

if(mistakes>=4) lose()

}

function createGroup(cat){

const container=document.createElement("div")

const title=document.createElement("div")
title.innerText=cat.name
title.style.fontWeight="bold"
title.style.margin="10px 0 4px 0"

const row=document.createElement("div")
row.className="groupRow"

cat.roundWords.forEach(w=>{

let tile=document.createElement("div")
tile.className="tile"
tile.innerText=w

row.appendChild(tile)

})

container.appendChild(title)
container.appendChild(row)

document.getElementById("groups").appendChild(container)

}

function updateInfo(){

document.getElementById("info").innerText=
"Fehler "+mistakes+" / 4"

}

function checkWin(){

if(solved===4){

statsPlayed++
statsWins++

showPanel("Gewonnen")

}

}

function lose(){

statsPlayed++

showPanel("Verloren")

}

function showPanel(title){

document.getElementById("resultTitle").innerText=title

document.getElementById("stats").innerHTML=

"Spiele: "+statsPlayed+"<br>"+
"Siege: "+statsWins

document.getElementById("overlay").style.display="flex"

}

document.getElementById("restartBtn").onclick=function(){

location.reload()

}

</script>

</body>
</html>
